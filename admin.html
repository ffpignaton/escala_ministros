<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin Escalas</title>
<link rel="stylesheet" href="style.css">

<!-- Firebase CDN -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

</head>
<body>

<header>
<h1>Administração</h1>
<h2>Paróquia Santíssima Trindade</h2>
</header>

<section class="login" id="loginBox">
<h3>Login</h3>
<input id="user" placeholder="Usuário">
<input id="pass" type="password" placeholder="Senha">
<button onclick="login()">Entrar</button>
</section>

<section id="painel" class="hidden">

<h3>Ministros</h3>
<input id="nome" placeholder="Nome">
<input id="fone" placeholder="Telefone">
<button onclick="salvarMinistro()">Salvar Ministro</button>

<hr>

<h3>Escala</h3>
<input type="date" id="dataEscala">
<input type="time" id="horaEscala">
<select id="ministroEscala"></select>
<button onclick="salvarEscala()">Salvar Escala</button>

</section>

<script src="script.js"></script>
</body>
</html>
