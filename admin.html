<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Painel Admin</title>
<link rel="stylesheet" href="style.css">
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>

<body>

<header>
<h2>Paróquia Santíssima Trindade</h2>
<h3>Painel Administrativo</h3>
</header>

<div class="container">

<!-- ESQUERDA -->
<div class="card left">

<h3>Ministros</h3>

<input id="nome" placeholder="Nome">
<input id="fone" placeholder="Telefone">
<button onclick="salvarMinistro()">Adicionar Ministro</button>

<div id="listaMinistros"></div>

</div>

<!-- DIREITA -->
<div class="card right">

<h3>Escala</h3>

<input type="date" id="dataEscala">
<input type="time" id="horaEscala">

<h4>Selecionar Ministros</h4>
<div class="checkbox-list" id="checkboxes"></div>

<button onclick="salvarEscala()">Salvar Escala</button>

<h3>Escalas Criadas</h3>

<table class="table">
<thead>
<tr>
<th>Data</th>
<th>Hora</th>
<th>Ministros</th>
<th>Ações</th>
</tr>
</thead>
<tbody id="tabela"></tbody>
</table>

</div>

</div>

<script src="script.js"></script>
</body>
</html>
