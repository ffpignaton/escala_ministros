<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Painel Administrativo</title>
  <link rel="stylesheet" href="css/admin.css">
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="js/firebase.js"></script>
</head>

<body>
  <div class="dashboard">
    <!-- MENU -->
    <div class="sidebar">
      <h2>⛪ Escalas</h2>
      <div class="menu-item" onclick="abrirTela('ministros')">👥 Ministros</div>
      <div class="menu-item" onclick="abrirTela('escalas')">📅 Escalas</div>
    </div>

    <!-- CONTEÚDO -->
    <div class="main">
      <header class="topo">
        <h1>Paróquia Santíssima Trindade</h1>
        <h3>Escala de Ministros</h3>
      </header>

      <!-- MINISTROS -->
      <section id="ministros" class="tela hidden">
        <div class="card">
          <h2>Cadastro de Ministros</h2>
          <input id="nome" placeholder="Nome do ministro">
          <input id="fone" placeholder="(00) 00000-0000">
          <input id="endereco" placeholder="Endereço do ministro">
          <button onclick="salvarMinistro()">Salvar Ministro</button>
        </div>

        <div class="card">
          <h2>Lista de Ministros</h2>
          <table id="tabelaMinistros">
            <thead>
              <tr>
                <th>Nome</th>
                <th>Telefone</th>
                <th>Endereço</th>
                <th>Ação</th>
              </tr>
            </thead>
            <tbody id="listaMinistros"></tbody>
          </table>
        </div>
      </section>

      <!-- ESCALAS -->
      <section id="escalas" class="tela hidden">
        <div class="card">
          <h2>Cadastro de Escala</h2>
          <label for="dataEscala">Data:</label>
          <input type="date" id="dataEscala">
          <label for="horaEscala">Hora:</label>
          <input type="time" id="horaEscala">
          <h3>Selecione os Ministros</h3>
          <div id="seletorMinistros"></div>
          <button onclick="salvarEscala()">Salvar Escala</button>
        </div>

        <div class="card">
          <h2>Lista de Escalas</h2>
          <table id="tabelaEscalas">
            <thead>
              <tr>
                <th>Data</th>
                <th>Hora</th>
                <th>Ministros</th>
                <th>Ação</th>
              </tr>
            </thead>
            <tbody id="listaEscalas"></tbody>
          </table>
        </div>
      </section>
    </div>
  </div>

  <script src="js/admin.js"></script>
</body>
</html>
