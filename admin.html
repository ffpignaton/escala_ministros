<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin Escalas</title>
<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>

<body>

<header>
<h1>Painel Admin</h1>
<h2>Paróquia Santíssima Trindade</h2>
</header>

<section class="login" id="loginBox">
<h3>Login</h3>
<input id="user" placeholder="Usuário">
<input id="pass" type="password" placeholder="Senha">
<button onclick="login()">Entrar</button>
</section>

<section id="painel" class="hidden">

<h3>Cadastrar Ministro</h3>
<input id="nome" placeholder="Nome">
<input id="fone" placeholder="Telefone">
<button onclick="salvarMinistro()">Salvar</button>

<hr>

<h3>Escala (múltiplos ministros)</h3>

<input type="date" id="dataEscala">
<input type="time" id="horaEscala">

<div id="listaCheckbox"></div>

<button onclick="salvarEscala()">Salvar Escala</button>

<hr>

<h3>Escalas Criadas</h3>

<table border="1" width="100%">
<thead>
<tr>
<th>Data</th>
<th>Hora</th>
<th>Ministros</th>
</tr>
</thead>
<tbody id="tabelaEscalas"></tbody>
</table>

</section>

<script src="script.js"></script>
</body>
</html>
