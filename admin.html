<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Painel Admin</title>

<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>

<body>

<div class="dashboard">

<!-- MENU -->
<div class="sidebar">
<h2>⛪ Escalas</h2>

<div class="menu-item">📋 Dashboard</div>
<div class="menu-item">👥 Ministros</div>
<div class="menu-item">📅 Escalas</div>
<div class="menu-item">📄 Relatórios</div>
</div>

<!-- CONTEÚDO -->
<div class="main">

<header>
<h2>Paróquia Santíssima Trindade</h2>
<h3>Painel Administrativo</h3>
</header>

<div class="grid">

<!-- CARD MINISTROS -->
<div class="card">
<h3>👥 Cadastro de Ministros</h3>

<input id="nome" placeholder="Nome do ministro">
<input id="fone" placeholder="Telefone">

<button onclick="salvarMinistro()">Salvar Ministro</button>

<div id="listaMinistros"></div>

</div>

<!-- CARD ESCALAS -->
<div class="card">
<h3>📅 Criar Escala</h3>

<input type="date" id="dataEscala">
<input type="time" id="horaEscala">

<div class="checkbox-box" id="checkboxes"></div>

<button onclick="salvarEscala()">Salvar Escala</button>

</div>

</div>

<!-- TABELA -->
<div class="card" style="margin-top:20px;">
<h3>📋 Escalas Criadas</h3>

<table class="table">
<thead>
<tr>
<th>Data</th>
<th>Hora</th>
<th>Ministros</th>
<th>Ações</th>
</tr>
</thead>

<tbody id="tabela"></tbody>
</table>

</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
