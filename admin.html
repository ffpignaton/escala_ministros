<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Painel Administrativo</title>

<link rel="stylesheet" href="css/admin.css">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script src="js/firebase.js"></script>
</head>

<body>

<div class="dashboard">

<!-- MENU -->
<div class="sidebar">

<h2>⛪ Escalas</h2>

<div class="menu-item" onclick="abrirTela('dashboard')">📋 Dashboard</div>
<div class="menu-item" onclick="abrirTela('ministros')">👥 Ministros</div>
<div class="menu-item" onclick="abrirTela('escalas')">📅 Escalas</div>
<div class="menu-item" onclick="abrirTela('relatorios')">📄 Relatórios</div>

</div>

<!-- CONTEUDO -->
<div class="main">

<header>
<h2>Paróquia Santíssima Trindade</h2>
<h3>Painel Administrativo</h3>
</header>

<!-- DASHBOARD -->
<section id="dashboard" class="tela">
<div class="card">
<h3>Bem-vindo</h3>
<p>Sistema de escalas dos ministros.</p>
</div>
</section>

<!-- MINISTROS -->
<section id="ministros" class="tela hidden">

<div class="card">
<h3>Cadastro de Ministro</h3>

<input id="nome" placeholder="Nome">

<input id="fone"
placeholder="(00)00000-0000"
maxlength="14"
oninput="mascaraTelefone(this)">

<button onclick="salvarMinistro()">Salvar Ministro</button>

</div>

<div class="card">
<h3>Lista de Ministros</h3>
<div id="listaMinistros"></div>
</div>

</section>

<!-- ESCALAS -->
<section id="escalas" class="tela hidden">

<div class="card">
<h3>Criar Escala</h3>

<input type="date" id="dataEscala">
<input type="time" id="horaEscala">

<div id="seletorMinistros" class="tags-box"></div>

<button onclick="salvarEscala()">Salvar Escala</button>

</div>

<div class="card">
<h3>Escalas Criadas</h3>

<table class="table">
<thead>
<tr>
<th>Data</th>
<th>Hora</th>
<th>Ministros</th>
<th>Ações</th>
</tr>
</thead>

<tbody id="tabela"></tbody>
</table>

</div>

</section>

<!-- RELATORIOS -->
<section id="relatorios" class="tela hidden">

<div class="card">
<h3>Relatórios</h3>
<p>Área pronta para PDF.</p>
</div>

</section>

</div>
</div>

<script src="js/admin.js"></script>

</body>
</html>
