<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Painel Administrativo</title>

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>

<link rel="stylesheet" href="css/admin.css">

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="js/firebase.js"></script>

<!-- PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

<div class="dashboard">

<div class="sidebar">
<h2>⛪ Escalas</h2>

<div class="menu-item" onclick="abrirTela('dashboard')">Dashboard</div>
<div class="menu-item" onclick="abrirTela('ministros')">Ministros</div>
<div class="menu-item" onclick="abrirTela('escalas')">Escalas</div>
<div class="menu-item" onclick="abrirTela('relatorios')">Relatórios</div>
</div>

<div class="main">

<header>
<h2>Paróquia Santíssima Trindade</h2>
</header>

<section id="dashboard" class="tela">
<div class="card">Bem-vindo</div>
</section>

<section id="ministros" class="tela hidden">

<div class="card">
<h3>Cadastrar</h3>
<input id="nome" placeholder="Nome">
<input id="fone" placeholder="(00)00000-0000" oninput="mascaraTelefone(this)">
<button onclick="salvarMinistro()">Salvar</button>
</div>

<div class="card">
<h3>Lista</h3>
<div id="listaMinistros"></div>
</div>

</section>

<section id="escalas" class="tela hidden">

<div class="card">
<h3>Criar Escala</h3>
<input type="date" id="dataEscala">
<input type="time" id="horaEscala">
<div id="seletorMinistros" class="tags-box"></div>
<button onclick="salvarEscala()">Salvar</button>
</div>

<div class="card">
<h3>Escalas Criadas</h3>
<div id="listaEscalasCards"></div>
</div>

<div class="card">
<h3>Calendário</h3>
<div id="calendarAdmin"></div>
</div>

</section>

<section id="relatorios" class="tela hidden">
<div class="card">
<button onclick="gerarPDF()">📄 Exportar PDF</button>
</div>
</section>

</div>
</div>

<!-- MODAL -->
<div id="modalEditar" style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
justify-content:center;
align-items:center;
z-index:999;
">

<div class="modal-box">
<h3>Editar Escala</h3>

<input type="date" id="editData">
<input type="time" id="editHora">

<div id="editMinistros" class="tags-box"></div>

<div class="modal-actions">
<button class="btn-save" onclick="salvarEdicao()">Salvar</button>
<button class="btn-cancel" onclick="fecharModal()">Cancelar</button>
</div>

</div>
</div>

<script src="js/admin.js"></script>

</body>
</html>
