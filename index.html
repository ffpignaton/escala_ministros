<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Escalas São Jorge</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
<h1>Paróquia Santíssima Trindade</h1>
<h2>Matriz São Jorge</h2>
</header>

<div class="login" id="loginBox">
<h3>Login Administrativo</h3>
<input type="text" id="user" placeholder="Usuário">
<input type="password" id="pass" placeholder="Senha">
<button onclick="login()">Entrar</button>
</div>

<div id="painel" class="hidden">

<section>
<h3>Cadastrar Ministro</h3>
<input type="text" id="nome" placeholder="Nome">
<input type="text" id="fone" placeholder="Telefone">
<button onclick="salvarMinistro()">Salvar Ministro</button>
<ul id="listaMinistros"></ul>
</section>

<section>
<h3>Criar Escala</h3>
<input type="date" id="dataEscala">
<input type="time" id="horaEscala">

<select id="ministroEscala"></select>

<button onclick="salvarEscala()">Salvar Escala</button>
</section>

</div>

<section>
<h3>Calendário de Escalas</h3>
<input type="date" id="verData">
<button onclick="verEscala()">Ver Dia</button>

<div id="resultado"></div>
</section>

<script src="script.js"></script>
</body>
</html>
